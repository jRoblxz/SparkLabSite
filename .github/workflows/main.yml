name: 🚀 Deploy test website on push

on:
  push:
    branches:
      - main
  # Removendo pull_request se o deploy não deve ocorrer ao abrir um PR.
  # pull_request:
  #   branches:
  #     - main
  #     - Dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      
      # 1. Obter o Código (Step Corrigida)
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      # 2. Configurar o Node.js e PNPM (Juntos)
      - name: 🛠️ Setup Node.js and PNPM
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Não roda a instalação aqui, fazemos no passo 3

      # 3. CRÍTICO: Instala o PNPM globalmente e o utiliza
      # Usamos 'shell: bash' para garantir que o comando export seja executado.
      - name: 📦 Install PNPM and Build
        shell: bash
        run: |
          # Instala o pnpm globalmente e força a atualização do PATH
          npm install -g pnpm --registry=https://registry.npmjs.org/
          
          # Encontra o caminho do binário do pnpm e adiciona ao PATH temporariamente
          PNPM_BIN=$(npm prefix -g)/bin
          echo "Adicionando $PNPM_BIN ao PATH"
          export PATH=$PATH:$PNPM_BIN

          # Navega para o diretório e executa os comandos, que agora devem encontrar o pnpm l
          cd ./spark-lab-code-site/
          pnpm install
          pnpm run build

      # 5. Fazer o Deploy do Conteúdo da pasta 'dist'
      - name: 📂 Sync files (FTP Deploy)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_SENHA }}
          local-dir: ./spark-lab-code-site/dist/public/
          server-dir: /public_html/
          exclude: |
            public/**
            vendor/**
            plugin/**
            Banco_de_Dados_CR/**
            crons/**
            storage/**
            .github
            .github/**
            .env
            composer.json
            composer.lock
            .htaccess
            config.php
            config.js

      # 5️⃣ Setup PHP
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      # 6️⃣ Install Composer dependencies (PHPMailer)
      - name: 📦 Install Composer dependencies
        working-directory: ./Portifolio-Api
        run: |
          rm -rf vendor 
          composer install --no-dev --optimize-autoloader

      # 5️⃣ Deploy do BACKEND
      - name: 🐘 Deploy Backend (PHP API)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_SENHA }}
          local-dir: ./Portifolio-Api/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/node_modules/**
            **/storage/**
